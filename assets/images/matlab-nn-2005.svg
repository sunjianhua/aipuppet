<svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="matlab-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e97826;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4621a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="150" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2" rx="10"/>
  
  <!-- MATLAB Logo Background -->
  <rect x="15" y="15" width="170" height="50" fill="url(#matlab-gradient)" rx="5"/>
  
  <!-- MATLAB Text -->
  <text x="100" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">MATLAB</text>
  <text x="100" y="55" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Neural Network Toolbox</text>
  
  <!-- Neural Network Visualization -->
  <!-- Input Layer -->
  <circle cx="40" cy="85" r="6" fill="#28a745" stroke="#fff" stroke-width="2"/>
  <circle cx="40" cy="105" r="6" fill="#28a745" stroke="#fff" stroke-width="2"/>
  <circle cx="40" cy="125" r="6" fill="#28a745" stroke="#fff" stroke-width="2"/>
  
  <!-- Hidden Layer -->
  <circle cx="100" cy="80" r="6" fill="#ffc107" stroke="#fff" stroke-width="2"/>
  <circle cx="100" cy="100" r="6" fill="#ffc107" stroke="#fff" stroke-width="2"/>
  <circle cx="100" cy="120" r="6" fill="#ffc107" stroke="#fff" stroke-width="2"/>
  <circle cx="100" cy="140" r="6" fill="#ffc107" stroke="#fff" stroke-width="2"/>
  
  <!-- Output Layer -->
  <circle cx="160" cy="95" r="6" fill="#dc3545" stroke="#fff" stroke-width="2"/>
  <circle cx="160" cy="115" r="6" fill="#dc3545" stroke="#fff" stroke-width="2"/>
  
  <!-- Connections -->
  <line x1="46" y1="85" x2="94" y2="80" stroke="#6c757d" stroke-width="1"/>
  <line x1="46" y1="85" x2="94" y2="100" stroke="#6c757d" stroke-width="1"/>
  <line x1="46" y1="105" x2="94" y2="100" stroke="#6c757d" stroke-width="1"/>
  <line x1="46" y1="105" x2="94" y2="120" stroke="#6c757d" stroke-width="1"/>
  <line x1="46" y1="125" x2="94" y2="120" stroke="#6c757d" stroke-width="1"/>
  <line x1="46" y1="125" x2="94" y2="140" stroke="#6c757d" stroke-width="1"/>
  
  <line x1="106" y1="80" x2="154" y2="95" stroke="#6c757d" stroke-width="1"/>
  <line x1="106" y1="100" x2="154" y2="95" stroke="#6c757d" stroke-width="1"/>
  <line x1="106" y1="120" x2="154" y2="115" stroke="#6c757d" stroke-width="1"/>
  <line x1="106" y1="140" x2="154" y2="115" stroke="#6c757d" stroke-width="1"/>
  
  <!-- Labels -->
  <text x="40" y="75" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Input</text>
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Hidden</text>
  <text x="160" y="85" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Output</text>
</svg>