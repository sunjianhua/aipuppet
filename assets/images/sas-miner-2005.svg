<svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sas-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004499;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="150" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2" rx="10"/>
  
  <!-- SAS Logo Background -->
  <rect x="20" y="20" width="160" height="40" fill="url(#sas-gradient)" rx="5"/>
  
  <!-- SAS Text -->
  <text x="100" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">SAS</text>
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Enterprise Miner</text>
  
  <!-- Data Mining Process Flow -->
  <!-- Data -->
  <rect x="20" y="90" width="30" height="20" fill="#28a745" rx="3"/>
  <text x="35" y="103" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Data</text>
  
  <!-- Process -->
  <rect x="70" y="90" width="30" height="20" fill="#ffc107" rx="3"/>
  <text x="85" y="103" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Clean</text>
  
  <!-- Model -->
  <rect x="120" y="90" width="30" height="20" fill="#17a2b8" rx="3"/>
  <text x="135" y="103" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Model</text>
  
  <!-- Results -->
  <rect x="170" y="90" width="30" height="20" fill="#dc3545" rx="3"/>
  <text x="185" y="103" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Result</text>
  
  <!-- Flow Arrows -->
  <polygon points="55,100 65,95 65,105" fill="#6c757d"/>
  <polygon points="105,100 115,95 115,105" fill="#6c757d"/>
  <polygon points="155,100 165,95 165,105" fill="#6c757d"/>
  
  <!-- Mining Tools Icons -->
  <circle cx="50" cy="130" r="8" fill="#6f42c1"/>
  <text x="50" y="135" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">C</text>
  
  <rect x="92" y="122" width="16" height="16" fill="#fd7e14" rx="2"/>
  <text x="100" y="133" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">R</text>
  
  <polygon points="140,122 148,130 140,138 132,130" fill="#20c997"/>
  <text x="140" y="133" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">N</text>
</svg>