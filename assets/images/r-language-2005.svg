<svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="r-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#276dc3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#165aa7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="150" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2" rx="10"/>
  
  <!-- R Logo Circle -->
  <circle cx="100" cy="60" r="35" fill="url(#r-gradient)" stroke="#ffffff" stroke-width="3"/>
  
  <!-- R Letter -->
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">R</text>
  
  <!-- Title -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">R Statistical</text>
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Computing</text>
  
  <!-- Statistical symbols -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="14" fill="#666">σ</text>
  <text x="170" y="30" font-family="Arial, sans-serif" font-size="14" fill="#666">μ</text>
  <text x="20" y="120" font-family="Arial, sans-serif" font-size="12" fill="#666">∑</text>
  <text x="175" y="120" font-family="Arial, sans-serif" font-size="12" fill="#666">∫</text>
</svg>