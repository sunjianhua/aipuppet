<svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weka-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="150" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2" rx="10"/>
  
  <!-- WEKA Logo Background -->
  <rect x="20" y="20" width="160" height="80" fill="url(#weka-gradient)" rx="8"/>
  
  <!-- WEKA Text -->
  <text x="100" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">WEKA</text>
  <text x="100" y="70" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Machine Learning</text>
  <text x="100" y="85" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Workbench</text>
  
  <!-- Data visualization elements -->
  <circle cx="40" cy="120" r="8" fill="#28a745"/>
  <circle cx="70" cy="115" r="6" fill="#ffc107"/>
  <circle cx="100" cy="125" r="7" fill="#dc3545"/>
  <circle cx="130" cy="118" r="5" fill="#17a2b8"/>
  <circle cx="160" cy="122" r="6" fill="#6f42c1"/>
  
  <!-- Connecting lines -->
  <line x1="40" y1="120" x2="70" y2="115" stroke="#6c757d" stroke-width="2"/>
  <line x1="70" y1="115" x2="100" y2="125" stroke="#6c757d" stroke-width="2"/>
  <line x1="100" y1="125" x2="130" y2="118" stroke="#6c757d" stroke-width="2"/>
  <line x1="130" y1="118" x2="160" y2="122" stroke="#6c757d" stroke-width="2"/>
</svg>