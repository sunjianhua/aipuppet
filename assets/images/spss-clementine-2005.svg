<svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spss-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="150" fill="#f8f9fa" stroke="#dee2e6" stroke-width="2" rx="10"/>
  
  <!-- SPSS Logo Background -->
  <rect x="15" y="15" width="170" height="35" fill="url(#spss-gradient)" rx="5"/>
  
  <!-- SPSS Text -->
  <text x="100" y="38" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">SPSS Clementine</text>
  
  <!-- Visual Data Flow -->
  <!-- Input Node -->
  <rect x="20" y="65" width="25" height="20" fill="#28a745" rx="3"/>
  <text x="32" y="78" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">CSV</text>
  
  <!-- Filter Node -->
  <circle cx="80" cy="75" r="12" fill="#ffc107"/>
  <text x="80" y="79" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Filter</text>
  
  <!-- Model Node -->
  <polygon points="125,65 145,75 125,85 105,75" fill="#17a2b8"/>
  <text x="125" y="79" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Model</text>
  
  <!-- Output Node -->
  <rect x="165" y="65" width="25" height="20" fill="#dc3545" rx="3"/>
  <text x="177" y="78" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Out</text>
  
  <!-- Flow Connections -->
  <line x1="45" y1="75" x2="68" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="92" y1="75" x2="105" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="145" y1="75" x2="165" y2="75" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Additional Processing Nodes -->
  <circle cx="60" cy="110" r="10" fill="#6f42c1"/>
  <text x="60" y="114" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle">Type</text>
  
  <rect x="95" y="100" width="20" height="20" fill="#fd7e14" rx="2"/>
  <text x="105" y="113" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle">Stats</text>
  
  <circle cx="140" cy="110" r="10" fill="#20c997"/>
  <text x="140" y="114" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle">Plot</text>
  
  <!-- Connection lines to additional nodes -->
  <line x1="80" y1="87" x2="60" y2="100" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="125" y1="85" x2="105" y2="100" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="125" y1="85" x2="140" y2="100" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Visual Data Mining</text>
</svg>